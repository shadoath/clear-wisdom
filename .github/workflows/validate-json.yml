name: Validate JSON Files

on:
  push:
    paths:
      - "extension/lib/**/ideas.json"
      - "extension/lib/**/quotes.json"
      - "extension/lib/**/questions.json"
  pull_request:
    paths:
      - "extension/lib/**/ideas.json"
      - "extension/lib/**/quotes.json"
      - "extension/lib/**/questions.json"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          shopt -s nullglob
          files=(extension/lib/*/*.json)
          for file in "${files[@]}"; do
            if ! jq empty "$file" 2>/dev/null; then
              echo "❌ $file is not valid JSON"
              exit 1
            fi
            echo "✅ $file is valid"
          done
